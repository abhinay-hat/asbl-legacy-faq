<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASBL Legacy — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Josefin+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="login-page">

  <div class="login-wrap">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <svg viewBox="0 0 220 72" height="60" xmlns="http://www.w3.org/2000/svg" aria-label="ASBL Legacy">
          <defs><style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Josefin+Sans:wght@600&display=swap');</style></defs>
          <text x="110" y="13" font-family="'Josefin Sans', sans-serif" font-size="10" font-weight="700" letter-spacing="3" text-anchor="middle" fill="#0F0F0F">ASBL</text>
          <text x="110" y="52" font-family="'Playfair Display', Georgia, serif" font-size="38" font-weight="400" letter-spacing="1" text-anchor="middle" fill="#0F0F0F">LEGACY</text>
          <text x="110" y="68" font-family="'Josefin Sans', sans-serif" font-size="8" font-weight="600" letter-spacing="4" text-anchor="middle" fill="#0F0F0F">RTC CROSS ROAD</text>
        </svg>
      </div>

      <div class="login-divider"></div>

      <h1 class="login-title">Sales Intelligence Portal</h1>
      <p class="login-sub">Sign in to access the project FAQ</p>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            autocapitalize="none"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Toggle password visibility" onclick="togglePassword()">
              <svg id="pw-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="login-error" class="login-error" style="display:none"></div>

        <button type="submit" class="btn-submit login-btn" id="login-btn">
          <svg id="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10,17 15,12 10,7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          <span id="btn-text">Sign In</span>
        </button>
      </form>

      <p class="login-footer">Access is restricted to authorized personnel only.</p>
    </div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
